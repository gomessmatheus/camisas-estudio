<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camisas — Estúdio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f0f;
  --surface: #181818;
  --surface2: #222222;
  --border: rgba(255,255,255,0.08);
  --border-hover: rgba(255,255,255,0.18);
  --text: #f0f0f0;
  --text-muted: #888;
  --text-dim: #555;
  --accent: #e8ff47;
  --accent-dim: rgba(232,255,71,0.12);
  --radius: 12px;
  --radius-sm: 8px;
  --font: 'DM Sans', sans-serif;
  --mono: 'DM Mono', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 15px; line-height: 1.5; }
body { min-height: 100vh; }

/* SCROLLBAR */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 2px; }

/* LAYOUT */
.app { max-width: 900px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }

/* HEADER */
.header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 2rem; gap: 1rem; }
.brand { display: flex; flex-direction: column; gap: 2px; }
.brand-title { font-size: 22px; font-weight: 500; letter-spacing: -0.02em; color: var(--text); }
.brand-sub { font-size: 12px; color: var(--text-dim); font-family: var(--mono); }
.header-actions { display: flex; gap: 8px; }

/* STATS */
.stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 1.75rem; }
.stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0.9rem 1rem; }
.stat-label { font-size: 11px; color: var(--text-dim); font-family: var(--mono); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
.stat-num { font-size: 24px; font-weight: 300; color: var(--text); letter-spacing: -0.03em; }
.stat-num span { font-size: 11px; color: var(--text-dim); font-family: var(--mono); }

/* OWNER PILLS */
.owner-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.25rem; align-items: center; }
.pill { display: inline-flex; align-items: center; gap: 6px; padding: 5px 13px; border: 1px solid var(--border); border-radius: 20px; font-size: 13px; cursor: pointer; background: transparent; color: var(--text-muted); transition: all 0.15s; font-family: var(--font); }
.pill:hover { border-color: var(--border-hover); color: var(--text); }
.pill.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
.pill-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.pill-count { font-size: 11px; opacity: 0.6; font-family: var(--mono); }

/* CONTROLS */
.controls { display: flex; gap: 8px; margin-bottom: 1.75rem; flex-wrap: wrap; }
.search { flex: 1; min-width: 160px; padding: 8px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-size: 14px; font-family: var(--font); outline: none; transition: border-color 0.15s; }
.search:focus { border-color: var(--border-hover); }
.search::placeholder { color: var(--text-dim); }
select.flt { padding: 8px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-size: 13px; font-family: var(--font); cursor: pointer; outline: none; }
select.flt:focus { border-color: var(--border-hover); }

/* BUTTONS */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: transparent; color: var(--text-muted); font-size: 13px; cursor: pointer; font-family: var(--font); transition: all 0.15s; white-space: nowrap; }
.btn:hover { border-color: var(--border-hover); color: var(--text); }
.btn-accent { background: var(--accent); color: #0f0f0f; border-color: var(--accent); font-weight: 500; }
.btn-accent:hover { background: #d4e840; border-color: #d4e840; color: #0f0f0f; }
.btn-sm { padding: 5px 11px; font-size: 12px; }
.btn-danger { border-color: rgba(226,75,74,0.4); color: #e24b4a; }
.btn-danger:hover { background: rgba(226,75,74,0.1); }

/* TEAM GROUPS */
.team-group { margin-bottom: 2.5rem; }
.team-header { display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; }
.team-label { font-size: 17px; font-weight: 500; letter-spacing: -0.01em; color: var(--text); }
.team-count { font-size: 11px; color: var(--text-dim); font-family: var(--mono); background: var(--surface); border: 1px solid var(--border); padding: 2px 8px; border-radius: 20px; }
.shirt-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(165px, 1fr)); gap: 10px; }

/* CARDS */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; cursor: pointer; transition: border-color 0.15s, transform 0.1s; }
.card:hover { border-color: var(--border-hover); transform: translateY(-1px); }
.card-img { width: 100%; height: 130px; object-fit: cover; display: block; background: var(--surface2); }
.card-placeholder { width: 100%; height: 130px; display: flex; align-items: center; justify-content: center; background: var(--surface2); font-size: 32px; }
.card-body { padding: 0.7rem 0.8rem; }
.card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.loc-badge { display: inline-flex; align-items: center; gap: 3px; font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 6px; font-family: var(--mono); }
.loc-Casa { background: rgba(29,158,117,0.15); color: #4fcca0; }
.loc-Estudio { background: rgba(55,138,221,0.15); color: #60aae8; }
.loc-Lavanderia { background: rgba(186,117,23,0.15); color: #e8a84a; }
.loc-Emprestimo { background: rgba(216,90,48,0.15); color: #e87a55; }
.owner-indicator { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text-dim); }
.owner-dot-sm { width: 7px; height: 7px; border-radius: 50%; }
.card-num { font-size: 14px; font-weight: 500; color: var(--text); }
.card-meta { font-size: 11px; color: var(--text-dim); font-family: var(--mono); margin-top: 1px; }
.card-res { font-size: 10px; background: rgba(212,83,126,0.12); color: #d4537e; border-radius: 6px; padding: 2px 7px; margin-top: 6px; display: inline-block; font-family: var(--mono); }
.card-action-row { display: flex; justify-content: flex-end; margin-top: 8px; }
.res-btn { padding: 3px 9px; font-size: 11px; border: 1px solid var(--border); border-radius: 6px; background: transparent; color: var(--text-muted); cursor: pointer; font-family: var(--font); transition: all 0.15s; }
.res-btn:hover { border-color: var(--border-hover); color: var(--text); }
.res-btn.taken { color: var(--text-dim); border-color: transparent; cursor: default; }

/* EMPTY */
.empty { padding: 3rem; text-align: center; color: var(--text-dim); font-size: 14px; }

/* MODAL */
.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 200; padding: 1rem; backdrop-filter: blur(4px); }
.modal { background: var(--surface); border: 1px solid var(--border-hover); border-radius: var(--radius); padding: 1.5rem; width: 100%; max-width: 400px; max-height: 90vh; overflow-y: auto; }
.modal-title { font-size: 16px; font-weight: 500; color: var(--text); margin-bottom: 1.25rem; letter-spacing: -0.01em; }
.form-group { margin-bottom: 1rem; }
.form-label { font-size: 11px; color: var(--text-dim); font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 5px; display: block; }
.form-input { width: 100%; padding: 8px 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-size: 14px; font-family: var(--font); outline: none; transition: border-color 0.15s; }
.form-input:focus { border-color: var(--border-hover); }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.25rem; flex-wrap: wrap; }

/* PHOTO UPLOAD */
.photo-upload { width: 100%; height: 110px; border: 1px dashed var(--border-hover); border-radius: var(--radius-sm); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; gap: 6px; background: var(--surface2); transition: border-color 0.15s; }
.photo-upload:hover { border-color: var(--accent); }
.photo-upload-label { font-size: 12px; color: var(--text-dim); }
.photo-preview { width: 100%; height: 110px; object-fit: cover; border-radius: var(--radius-sm); display: block; cursor: pointer; }
.detail-img { width: 100%; max-height: 200px; object-fit: cover; border-radius: var(--radius-sm); margin-bottom: 1rem; cursor: pointer; }

/* PEOPLE MODAL */
.owner-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1rem; }
.owner-tag { display: flex; align-items: center; gap: 7px; padding: 5px 10px; border: 1px solid var(--border); border-radius: 20px; font-size: 13px; background: var(--surface2); color: var(--text); }
.owner-tag-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.owner-tag-remove { cursor: pointer; color: var(--text-dim); font-size: 14px; line-height: 1; transition: color 0.1s; background: none; border: none; padding: 0; }
.owner-tag-remove:hover { color: #e24b4a; }
.divider { height: 1px; background: var(--border); margin: 1rem 0; }
.color-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
.color-opt { width: 24px; height: 24px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: border-color 0.1s, transform 0.1s; }
.color-opt:hover { transform: scale(1.1); }
.color-opt.selected { border-color: white; }

/* RES LIST */
.res-list .res-item { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 13px; color: var(--text-muted); }
.res-list .res-item:last-child { border-bottom: none; }

/* FADE IN */
@keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }
.team-group { animation: fadeUp 0.3s ease both; }

/* MOBILE */
@media (max-width: 480px) {
  .stats { grid-template-columns: repeat(2, 1fr); }
  .shirt-grid { grid-template-columns: repeat(2, 1fr); }
  .header { flex-direction: column; }
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="brand">
      <div class="brand-title">Camisas</div>
      <div class="brand-sub" id="brandSub">estúdio</div>
    </div>
    <div class="header-actions">
      <button class="btn btn-sm" onclick="openPeople()">Pessoas</button>
      <button class="btn btn-accent" onclick="openAdd()">+ Adicionar</button>
    </div>
  </div>

  <div class="stats" id="stats"></div>
  <div class="owner-bar" id="ownerBar"></div>

  <div class="controls">
    <input class="search" type="text" id="search" placeholder="Buscar time, liga..." oninput="render()">
    <select class="flt" id="filterLoc" onchange="render()">
      <option value="">Todos os locais</option>
      <option>Casa</option><option>Estudio</option><option>Lavanderia</option><option>Emprestimo</option>
    </select>
    <select class="flt" id="filterLiga" onchange="render()">
      <option value="">Todas as ligas</option>
    </select>
  </div>

  <div id="content"></div>
</div>

<div id="modalRoot"></div>
<input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleFile(event)">

<script>
const COLORS = ['#378ADD','#4fcca0','#e87a55','#d4537e','#e8a84a','#a78bfa','#86efac','#f87171','#888780'];
const LOC_LABEL = { Casa:'Casa', Estudio:'Estúdio', Lavanderia:'Lavanderia', Emprestimo:'Empréstimo' };

function load(key, def) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; } catch { return def; }
}
function save(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
}

let owners = load('owners', [
  { id:'lucas', name:'Lucas', color:'#378ADD' },
  { id:'eu', name:'Eu', color:'#4fcca0' },
]);
let shirts = load('shirts', [
  { id:1, time:'Flamengo', liga:'Brasileirão', loc:'Estudio', owner:'lucas', num:'10', ano:'2023', reservas:[], foto:null },
  { id:2, time:'Flamengo', liga:'Brasileirão', loc:'Casa', owner:'eu', num:'9', ano:'2022', reservas:[], foto:null },
  { id:3, time:'Real Madrid', liga:'La Liga', loc:'Estudio', owner:'lucas', num:'7', ano:'2024', reservas:[], foto:null },
  { id:4, time:'Manchester City', liga:'Premier League', loc:'Lavanderia', owner:'eu', num:'17', ano:'2024', reservas:[], foto:null },
  { id:5, time:'Seleção Brasil', liga:'Seleção', loc:'Casa', owner:'lucas', num:'10', ano:'2022', reservas:[], foto:null },
  { id:6, time:'PSG', liga:'Ligue 1', loc:'Emprestimo', owner:'lucas', num:'7', ano:'2023', reservas:[{nome:'João',data:'2025-03-20'}], foto:null },
  { id:7, time:'Corinthians', liga:'Brasileirão', loc:'Estudio', owner:'eu', num:'11', ano:'2023', reservas:[], foto:null },
  { id:8, time:'Barcelona', liga:'La Liga', loc:'Casa', owner:'eu', num:'9', ano:'2024', reservas:[], foto:null },
]);
let nextId = load('nextId', 9);
let activeOwner = '';
let pendingPhoto = null;
let selectedColor = COLORS[0];

function persist() {
  save('owners', owners);
  save('shirts', shirts);
  save('nextId', nextId);
}

function ownerById(id) { return owners.find(o => o.id === id) || { name:'?', color:'#555' }; }
function fmt(d) { if(!d) return ''; const [y,m,day] = d.split('-'); return `${day}/${m}`; }

function renderOwnerBar() {
  const bar = document.getElementById('ownerBar');
  bar.innerHTML =
    `<button class="pill${activeOwner===''?' active':''}" onclick="setOwner('')">Todos</button>` +
    owners.map(o => {
      const c = shirts.filter(s => s.owner === o.id).length;
      return `<button class="pill${activeOwner===o.id?' active':''}" onclick="setOwner('${o.id}')">
        <span class="pill-dot" style="background:${o.color}"></span>
        ${o.name} <span class="pill-count">${c}</span>
      </button>`;
    }).join('');
}

function setOwner(id) { activeOwner = id; render(); }

function getFiltered() {
  const q = document.getElementById('search').value.toLowerCase();
  const loc = document.getElementById('filterLoc').value;
  const liga = document.getElementById('filterLiga').value;
  return shirts.filter(s => {
    if (activeOwner && s.owner !== activeOwner) return false;
    if (q && !s.time.toLowerCase().includes(q) && !s.liga.toLowerCase().includes(q)) return false;
    if (loc && s.loc !== loc) return false;
    if (liga && s.liga !== liga) return false;
    return true;
  });
}

function renderStats() {
  const src = activeOwner ? shirts.filter(s => s.owner === activeOwner) : shirts;
  const locs = ['Casa','Estudio','Lavanderia','Emprestimo'];
  document.getElementById('stats').innerHTML = locs.map(l => {
    const c = src.filter(s => s.loc === l).length;
    return `<div class="stat">
      <div class="stat-label">${LOC_LABEL[l]}</div>
      <div class="stat-num">${c} <span>camisas</span></div>
    </div>`;
  }).join('');
}

function updateFilters() {
  const ligas = [...new Set(shirts.map(s => s.liga))].sort();
  const sel = document.getElementById('filterLiga');
  const cur = sel.value;
  sel.innerHTML = '<option value="">Todas as ligas</option>' + ligas.map(l =>
    `<option value="${l}"${l===cur?' selected':''}>${l}</option>`).join('');
}

function render() {
  renderOwnerBar();
  renderStats();
  updateFilters();
  const filtered = getFiltered();
  document.getElementById('brandSub').textContent = `${filtered.length} camisa${filtered.length!==1?'s':''}`;
  const groups = {};
  filtered.forEach(s => { if(!groups[s.time]) groups[s.time]=[]; groups[s.time].push(s); });
  const teams = Object.keys(groups).sort();
  if (!teams.length) { document.getElementById('content').innerHTML='<div class="empty">Nenhuma camisa encontrada.</div>'; return; }
  document.getElementById('content').innerHTML = teams.map((team,i) => {
    const list = groups[team];
    const cards = list.map(s => {
      const o = ownerById(s.owner);
      const res = s.reservas.length ? s.reservas[s.reservas.length-1] : null;
      const img = s.foto
        ? `<img class="card-img" src="${s.foto}" alt="${s.time}">`
        : `<div class="card-placeholder">👕</div>`;
      const resBadge = res ? `<div class="card-res">⏺ ${res.nome} · ${fmt(res.data)}</div>` : '';
      const resBtn = s.loc==='Emprestimo'
        ? `<button class="res-btn taken">emprestada</button>`
        : res
          ? `<button class="res-btn taken">reservada</button>`
          : `<button class="res-btn" onclick="event.stopPropagation();openReserva(${s.id})">reservar</button>`;
      return `<div class="card" onclick="openDetail(${s.id})" style="animation-delay:${i*0.04}s">
        ${img}
        <div class="card-body">
          <div class="card-top">
            <div class="loc-badge loc-${s.loc}">${LOC_LABEL[s.loc]}</div>
            <div class="owner-indicator">
              <span class="owner-dot-sm" style="background:${o.color}"></span>
              ${o.name}
            </div>
          </div>
          <div class="card-num">Nº ${s.num} · ${s.ano}</div>
          <div class="card-meta">${s.liga}</div>
          ${resBadge}
          <div class="card-action-row">${resBtn}</div>
        </div>
      </div>`;
    }).join('');
    return `<div class="team-group" style="animation-delay:${i*0.06}s">
      <div class="team-header">
        <span class="team-label">${team}</span>
        <span class="team-count">${list.length}</span>
      </div>
      <div class="shirt-grid">${cards}</div>
    </div>`;
  }).join('');
}

function openDetail(id) {
  const s = shirts.find(x => x.id === id);
  const locs = ['Casa','Estudio','Lavanderia','Emprestimo'];
  const imgSection = s.foto
    ? `<img class="detail-img" src="${s.foto}">`
    : `<div class="photo-upload"><div style="font-size:22px">📷</div><div class="photo-upload-label">Adicionar foto</div></div>`;
  const resList = s.reservas.length
    ? s.reservas.map((r,i)=>`<div class="res-item"><span>${r.nome} · ${fmt(r.data)}</span><button class="btn btn-sm btn-danger" onclick="removeRes(${id},${i})">remover</button></div>`).join('')
    : `<div style="font-size:13px;color:var(--text-dim)">Sem reservas</div>`;
  const ownerOpts = owners.map(o=>`<option value="${o.id}"${o.id===s.owner?' selected':''}>${o.name}</option>`).join('');
  showModal(`<div class="modal">
    <div class="modal-title">${s.time} · Nº ${s.num}</div>
    <div style="cursor:pointer;margin-bottom:1rem" onclick="triggerPhoto('detail',${id})" id="dPhotoWrap">${imgSection}</div>
    <div class="form-group">
      <label class="form-label">Local</label>
      <select class="form-input" id="dLoc">${locs.map(l=>`<option value="${l}"${l===s.loc?' selected':''}>${LOC_LABEL[l]}</option>`).join('')}</select>
    </div>
    <div class="form-group">
      <label class="form-label">Dono</label>
      <select class="form-input" id="dOwner">${ownerOpts}</select>
    </div>
    <div class="form-group">
      <label class="form-label">Liga · Temporada</label>
      <div style="font-size:14px;color:var(--text-muted)">${s.liga} · ${s.ano}</div>
    </div>
    <div class="form-group">
      <label class="form-label">Reservas</label>
      <div class="res-list" id="resList_${id}">${resList}</div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-sm btn-danger" onclick="deleteShirt(${id})">excluir</button>
      <button class="btn btn-sm" onclick="closeModal()">fechar</button>
      <button class="btn btn-sm btn-accent" onclick="saveDetail(${id})">salvar</button>
    </div>
  </div>`);
}

function saveDetail(id) {
  const s = shirts.find(x=>x.id===id);
  s.loc = document.getElementById('dLoc').value;
  s.owner = document.getElementById('dOwner').value;
  persist(); closeModal(); render();
}

function removeRes(sid,idx) {
  shirts.find(x=>x.id===sid).reservas.splice(idx,1);
  persist(); openDetail(sid);
}

function deleteShirt(id) {
  if(!confirm('Remover esta camisa?')) return;
  shirts = shirts.filter(x=>x.id!==id);
  persist(); closeModal(); render();
}

function openReserva(id) {
  const s = shirts.find(x=>x.id===id);
  showModal(`<div class="modal">
    <div class="modal-title">Reservar · ${s.time} Nº ${s.num}</div>
    <div class="form-group"><label class="form-label">Seu nome</label><input class="form-input" type="text" id="rNome" placeholder="Ex: João"></div>
    <div class="form-group"><label class="form-label">Data de uso</label><input class="form-input" type="date" id="rData"></div>
    <div class="modal-actions">
      <button class="btn btn-sm" onclick="closeModal()">cancelar</button>
      <button class="btn btn-sm btn-accent" onclick="confirmRes(${id})">confirmar</button>
    </div>
  </div>`);
}

function confirmRes(id) {
  const nome = document.getElementById('rNome').value.trim();
  const data = document.getElementById('rData').value;
  if(!nome||!data){alert('Preencha nome e data.');return;}
  shirts.find(x=>x.id===id).reservas.push({nome,data});
  persist(); closeModal(); render();
}

let addPhotoData = null;
function openAdd() {
  addPhotoData = null;
  const ownerOpts = owners.map(o=>`<option value="${o.id}">${o.name}</option>`).join('');
  showModal(`<div class="modal">
    <div class="modal-title">Nova camisa</div>
    <div class="form-group">
      <label class="form-label">Foto</label>
      <div class="photo-upload" onclick="triggerPhoto('add',null)" id="addPhotoArea">
        <div style="font-size:22px">📷</div>
        <div class="photo-upload-label">Toque para adicionar</div>
      </div>
    </div>
    <div class="form-group"><label class="form-label">Dono</label><select class="form-input" id="aOwner">${ownerOpts}</select></div>
    <div class="form-group"><label class="form-label">Time</label><input class="form-input" type="text" id="aTime" placeholder="Ex: Flamengo"></div>
    <div class="form-group"><label class="form-label">Liga</label><input class="form-input" type="text" id="aLiga" placeholder="Ex: Brasileirão"></div>
    <div class="form-group"><label class="form-label">Número</label><input class="form-input" type="text" id="aNum" placeholder="Ex: 10"></div>
    <div class="form-group"><label class="form-label">Temporada</label><input class="form-input" type="text" id="aAno" placeholder="Ex: 2024"></div>
    <div class="form-group"><label class="form-label">Local</label>
      <select class="form-input" id="aLoc">
        <option value="Casa">Casa</option><option value="Estudio">Estúdio</option>
        <option value="Lavanderia">Lavanderia</option><option value="Emprestimo">Empréstimo</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-sm" onclick="closeModal()">cancelar</button>
      <button class="btn btn-sm btn-accent" onclick="confirmAdd()">adicionar</button>
    </div>
  </div>`);
}

function confirmAdd() {
  const time = document.getElementById('aTime').value.trim();
  const liga = document.getElementById('aLiga').value.trim();
  if(!time||!liga){alert('Preencha time e liga.');return;}
  shirts.push({ id:nextId++, time, liga,
    num: document.getElementById('aNum').value.trim()||'?',
    ano: document.getElementById('aAno').value.trim()||'?',
    loc: document.getElementById('aLoc').value,
    owner: document.getElementById('aOwner').value,
    reservas:[], foto:addPhotoData });
  persist(); closeModal(); render();
}

function openPeople() {
  selectedColor = COLORS[0];
  renderPeopleModal();
}

function renderPeopleModal() {
  const tags = owners.map(o=>`
    <div class="owner-tag">
      <span class="owner-tag-dot" style="background:${o.color}"></span>
      <span>${o.name}</span>
      <button class="owner-tag-remove" onclick="removePerson('${o.id}')">✕</button>
    </div>`).join('');
  const colorOpts = COLORS.map(c=>
    `<div class="color-opt${c===selectedColor?' selected':''}" style="background:${c}" onclick="selectColor('${c}')"></div>`
  ).join('');
  showModal(`<div class="modal">
    <div class="modal-title">Pessoas</div>
    <div class="owner-tags">${tags||'<div style="font-size:13px;color:var(--text-dim)">Nenhuma pessoa cadastrada.</div>'}</div>
    <div class="divider"></div>
    <div style="font-size:11px;color:var(--text-dim);font-family:var(--mono);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.75rem">Adicionar pessoa</div>
    <div class="form-group"><label class="form-label">Nome</label><input class="form-input" type="text" id="pName" placeholder="Ex: Pedro"></div>
    <div class="form-group">
      <label class="form-label">Cor</label>
      <div class="color-row" id="colorPicker">${colorOpts}</div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-sm" onclick="closeModal()">fechar</button>
      <button class="btn btn-sm btn-accent" onclick="addPerson()">adicionar</button>
    </div>
  </div>`);
}

function selectColor(c) {
  selectedColor = c;
  document.querySelectorAll('.color-opt').forEach(el => {
    el.classList.toggle('selected', el.style.background===c || el.style.backgroundColor===c);
  });
}

function addPerson() {
  const name = document.getElementById('pName').value.trim();
  if(!name){alert('Digite um nome.');return;}
  const id = 'o' + Date.now();
  owners.push({id, name, color:selectedColor});
  persist(); renderPeopleModal(); render();
}

function removePerson(id) {
  if(shirts.some(s=>s.owner===id)){alert('Essa pessoa tem camisas cadastradas.\nReatribua as camisas antes de remover.');return;}
  owners = owners.filter(o=>o.id!==id);
  if(activeOwner===id) activeOwner='';
  persist(); renderPeopleModal(); render();
}

function triggerPhoto(target, shirtId) {
  pendingPhoto = {target, shirtId};
  document.getElementById('fileInput').click();
}

function handleFile(e) {
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const url = ev.target.result;
    if(pendingPhoto.target==='add') {
      addPhotoData = url;
      const a = document.getElementById('addPhotoArea');
      if(a) a.innerHTML = `<img class="photo-preview" src="${url}">`;
    } else {
      const s = shirts.find(x=>x.id===pendingPhoto.shirtId);
      if(s) s.foto = url;
      persist(); openDetail(pendingPhoto.shirtId); render();
    }
  };
  reader.readAsDataURL(file);
  e.target.value='';
}

function showModal(html) {
  const m = document.getElementById('modalRoot');
  m.innerHTML = `<div class="modal-bg" onclick="if(event.target===this)closeModal()">${html}</div>`;
}

function closeModal() {
  document.getElementById('modalRoot').innerHTML = '';
}

render();
</script>
</body>
</html>
