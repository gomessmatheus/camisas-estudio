<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camisas — Estúdio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg:#0f0f0f; --surface:#181818; --surface2:#222;
  --border:rgba(255,255,255,0.08); --border-hover:rgba(255,255,255,0.18);
  --text:#f0f0f0; --text-muted:#888; --text-dim:#555;
  --accent:#e8ff47; --accent-dim:rgba(232,255,71,0.12);
  --radius:12px; --radius-sm:8px;
  --font:'DM Sans',sans-serif; --mono:'DM Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;line-height:1.5;}
body{min-height:100vh;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:var(--border-hover);border-radius:2px;}

.app{max-width:900px;margin:0 auto;padding:2rem 1.25rem 4rem;}

.loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:999;}
.spinner{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;}
.loading-text{font-size:13px;color:var(--text-dim);font-family:var(--mono);}
@keyframes spin{to{transform:rotate(360deg);}}

.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(10px);background:var(--surface);border:1px solid var(--border-hover);border-radius:var(--radius-sm);padding:10px 18px;font-size:13px;color:var(--text-muted);opacity:0;transition:all 0.2s;z-index:999;white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.err{border-color:rgba(226,75,74,0.5);color:#e24b4a;}

.header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:2rem;gap:1rem;}
.brand-title{font-size:22px;font-weight:500;letter-spacing:-0.02em;}
.brand-sub{font-size:12px;color:var(--text-dim);font-family:var(--mono);margin-top:2px;}
.header-actions{display:flex;gap:8px;}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1.75rem;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.9rem 1rem;}
.stat-label{font-size:11px;color:var(--text-dim);font-family:var(--mono);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em;}
.stat-num{font-size:24px;font-weight:300;letter-spacing:-.03em;}
.stat-num span{font-size:11px;color:var(--text-dim);font-family:var(--mono);}

.owner-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.25rem;}
.pill{display:inline-flex;align-items:center;gap:6px;padding:5px 13px;border:1px solid var(--border);border-radius:20px;font-size:13px;cursor:pointer;background:transparent;color:var(--text-muted);transition:all .15s;font-family:var(--font);}
.pill:hover{border-color:var(--border-hover);color:var(--text);}
.pill.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);}
.pill-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.pill-count{font-size:11px;opacity:.6;font-family:var(--mono);}

.controls{display:flex;gap:8px;margin-bottom:1.75rem;flex-wrap:wrap;}
.search{flex:1;min-width:160px;padding:8px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:14px;font-family:var(--font);outline:none;transition:border-color .15s;}
.search:focus{border-color:var(--border-hover);}
.search::placeholder{color:var(--text-dim);}
select.flt{padding:8px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:13px;font-family:var(--font);cursor:pointer;outline:none;}

.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:1px solid var(--border);border-radius:var(--radius-sm);background:transparent;color:var(--text-muted);font-size:13px;cursor:pointer;font-family:var(--font);transition:all .15s;white-space:nowrap;}
.btn:hover{border-color:var(--border-hover);color:var(--text);}
.btn:disabled{opacity:.4;cursor:default;}
.btn-accent{background:var(--accent);color:#0f0f0f;border-color:var(--accent);font-weight:500;}
.btn-accent:hover{background:#d4e840;border-color:#d4e840;color:#0f0f0f;}
.btn-sm{padding:5px 11px;font-size:12px;}
.btn-danger{border-color:rgba(226,75,74,.4);color:#e24b4a;}
.btn-danger:hover{background:rgba(226,75,74,.1);}

.team-group{margin-bottom:2.5rem;animation:fadeUp .3s ease both;}
.team-header{display:flex;align-items:center;gap:10px;margin-bottom:1rem;}
.team-label{font-size:17px;font-weight:500;letter-spacing:-.01em;}
.team-count{font-size:11px;color:var(--text-dim);font-family:var(--mono);background:var(--surface);border:1px solid var(--border);padding:2px 8px;border-radius:20px;}
.shirt-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:10px;}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:border-color .15s,transform .1s;}
.card:hover{border-color:var(--border-hover);transform:translateY(-1px);}
.card-img{width:100%;height:130px;object-fit:cover;display:block;}
.card-ph{width:100%;height:130px;display:flex;align-items:center;justify-content:center;background:var(--surface2);font-size:32px;}
.card-body{padding:.7rem .8rem;}
.card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.loc-badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:500;padding:2px 7px;border-radius:6px;font-family:var(--mono);}
.loc-Casa{background:rgba(29,158,117,.15);color:#4fcca0;}
.loc-Estudio{background:rgba(55,138,221,.15);color:#60aae8;}
.loc-Lavanderia{background:rgba(186,117,23,.15);color:#e8a84a;}
.loc-Emprestimo{background:rgba(216,90,48,.15);color:#e87a55;}
.owner-ind{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text-dim);}
.odot{width:7px;height:7px;border-radius:50%;}
.card-num{font-size:14px;font-weight:500;}
.card-meta{font-size:11px;color:var(--text-dim);font-family:var(--mono);margin-top:1px;}
.card-res{font-size:10px;background:rgba(212,83,126,.12);color:#d4537e;border-radius:6px;padding:2px 7px;margin-top:6px;display:inline-block;font-family:var(--mono);}
.card-ar{display:flex;justify-content:flex-end;margin-top:8px;}
.res-btn{padding:3px 9px;font-size:11px;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--text-muted);cursor:pointer;font-family:var(--font);transition:all .15s;}
.res-btn:hover{border-color:var(--border-hover);color:var(--text);}
.res-btn.taken{color:var(--text-dim);border-color:transparent;cursor:default;}

.empty{padding:3rem;text-align:center;color:var(--text-dim);font-size:14px;}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:200;padding:1rem;backdrop-filter:blur(4px);}
.modal{background:var(--surface);border:1px solid var(--border-hover);border-radius:var(--radius);padding:1.5rem;width:100%;max-width:400px;max-height:90vh;overflow-y:auto;}
.modal-title{font-size:16px;font-weight:500;margin-bottom:1.25rem;letter-spacing:-.01em;}
.fg{margin-bottom:1rem;}
.fl{font-size:11px;color:var(--text-dim);font-family:var(--mono);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;display:block;}
.fi{width:100%;padding:8px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:14px;font-family:var(--font);outline:none;transition:border-color .15s;}
.fi:focus{border-color:var(--border-hover);}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem;flex-wrap:wrap;}

.photo-upload{width:100%;height:110px;border:1px dashed var(--border-hover);border-radius:var(--radius-sm);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;gap:6px;background:var(--surface2);transition:border-color .15s;}
.photo-upload:hover{border-color:var(--accent);}
.photo-upload-label{font-size:12px;color:var(--text-dim);}
.photo-preview{width:100%;height:110px;object-fit:cover;border-radius:var(--radius-sm);display:block;cursor:pointer;}
.detail-img{width:100%;max-height:200px;object-fit:cover;border-radius:var(--radius-sm);margin-bottom:1rem;cursor:pointer;}

.owner-tags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1rem;}
.owner-tag{display:flex;align-items:center;gap:7px;padding:5px 10px;border:1px solid var(--border);border-radius:20px;font-size:13px;background:var(--surface2);}
.otdot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.otrm{cursor:pointer;color:var(--text-dim);font-size:14px;line-height:1;transition:color .1s;background:none;border:none;padding:0;}
.otrm:hover{color:#e24b4a;}
.divider{height:1px;background:var(--border);margin:1rem 0;}
.color-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;}
.copt{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color .1s,transform .1s;}
.copt:hover{transform:scale(1.1);}
.copt.sel{border-color:white;}

.res-list .ri{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;color:var(--text-muted);}
.res-list .ri:last-child{border-bottom:none;}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
@media(max-width:480px){
  .stats{grid-template-columns:repeat(2,1fr);}
  .shirt-grid{grid-template-columns:repeat(2,1fr);}
  .header{flex-direction:column;}
}
</style>
</head>
<body>

<div class="loading-screen" id="ls">
  <div class="spinner"></div>
  <div class="loading-text">carregando camisas...</div>
</div>

<div class="app" id="app" style="display:none">
  <div class="header">
    <div>
      <div class="brand-title">Camisas</div>
      <div class="brand-sub" id="brandSub">estúdio</div>
    </div>
    <div class="header-actions">
      <button class="btn btn-sm" onclick="openPeople()">Origens</button>
      <button class="btn btn-accent" onclick="openAdd()">+ Adicionar</button>
    </div>
  </div>
  <div class="stats" id="stats"></div>
  <div class="owner-bar" id="ownerBar"></div>
  <div class="controls">
    <input class="search" id="search" type="text" placeholder="Buscar time, liga..." oninput="render()">
    <select class="flt" id="filterLoc" onchange="render()">
      <option value="">Todos os locais</option>
      <option>Casa</option><option>Estudio</option><option>Lavanderia</option><option>Emprestimo</option>
    </select>
    <select class="flt" id="filterLiga" onchange="render()">
      <option value="">Todas as ligas</option>
    </select>
  </div>
  <div id="content"></div>
</div>

<div id="modalRoot"></div>
<div class="toast" id="toast"></div>
<input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleFile(event)">

<script>
const SB_URL='https://cufupfifhhfqnpeypwqp.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN1ZnVwZmlmaGhmcW5wZXlwd3FwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NTAzOTMsImV4cCI6MjA4OTQyNjM5M30.bLmcXpusXPIsxTL5olm1WJSsZU1ldaoBrG9VAPwqQ04';
const sb=supabase.createClient(SB_URL,SB_KEY);

const COLORS=['#378ADD','#4fcca0','#e87a55','#d4537e','#e8a84a','#a78bfa','#86efac','#f87171','#888780'];
const LOC_LABEL={Casa:'Casa',Estudio:'Estúdio',Lavanderia:'Lavanderia',Emprestimo:'Empréstimo'};

let owners=[],shirts=[],reservations=[],activeOwner='',pendingPhoto=null,selColor=COLORS[0],addPhoto=null;

function toast(msg,err=false){
  const el=document.getElementById('toast');
  el.textContent=msg; el.className='toast show'+(err?' err':'');
  clearTimeout(el._t); el._t=setTimeout(()=>el.className='toast',2500);
}

function ownerById(id){return owners.find(o=>o.id===id)||{name:'?',color:'#555'};}
function fmt(d){if(!d)return'';const[y,m,day]=d.split('-');return`${day}/${m}`;}
function resByShirt(id){return reservations.filter(r=>r.shirt_id===id);}

async function loadAll(){
  const[{data:ow},{data:sh},{data:re}]=await Promise.all([
    sb.from('owners').select('*').order('name'),
    sb.from('shirts').select('*').order('time'),
    sb.from('reservations').select('*').order('data'),
  ]);
  owners=ow||[]; shirts=sh||[]; reservations=re||[];
  document.getElementById('ls').style.display='none';
  document.getElementById('app').style.display='block';
  render();
}

function renderOwnerBar(){
  document.getElementById('ownerBar').innerHTML=
    `<button class="pill${activeOwner===''?' active':''}" onclick="setOwner('')">Todos</button>`+
    owners.map(o=>{
      const c=shirts.filter(s=>s.owner_id===o.id).length;
      return`<button class="pill${activeOwner===o.id?' active':''}" onclick="setOwner('${o.id}')">
        <span class="pill-dot" style="background:${o.color}"></span>${o.name}
        <span class="pill-count">${c}</span>
      </button>`;
    }).join('');
}

function setOwner(id){activeOwner=id;render();}

function getFiltered(){
  const q=document.getElementById('search').value.toLowerCase();
  const loc=document.getElementById('filterLoc').value;
  const liga=document.getElementById('filterLiga').value;
  return shirts.filter(s=>{
    if(activeOwner&&s.owner_id!==activeOwner)return false;
    if(q&&!s.time.toLowerCase().includes(q)&&!s.liga.toLowerCase().includes(q))return false;
    if(loc&&s.loc!==loc)return false;
    if(liga&&s.liga!==liga)return false;
    return true;
  });
}

function renderStats(){
  const src=activeOwner?shirts.filter(s=>s.owner_id===activeOwner):shirts;
  document.getElementById('stats').innerHTML=['Casa','Estudio','Lavanderia','Emprestimo'].map(l=>
    `<div class="stat"><div class="stat-label">${LOC_LABEL[l]}</div>
     <div class="stat-num">${src.filter(s=>s.loc===l).length} <span>camisas</span></div></div>`
  ).join('');
}

function updateFilters(){
  const ligas=[...new Set(shirts.map(s=>s.liga))].sort();
  const sel=document.getElementById('filterLiga'),cur=sel.value;
  sel.innerHTML='<option value="">Todas as ligas</option>'+
    ligas.map(l=>`<option value="${l}"${l===cur?' selected':''}>${l}</option>`).join('');
}

function render(){
  renderOwnerBar();renderStats();updateFilters();
  const filtered=getFiltered();
  document.getElementById('brandSub').textContent=`${filtered.length} camisa${filtered.length!==1?'s':''}`;
  const groups={};
  filtered.forEach(s=>{if(!groups[s.time])groups[s.time]=[];groups[s.time].push(s);});
  const teams=Object.keys(groups).sort();
  if(!teams.length){document.getElementById('content').innerHTML='<div class="empty">Nenhuma camisa encontrada.</div>';return;}
  document.getElementById('content').innerHTML=teams.map((team,i)=>{
    const list=groups[team];
    const cards=list.map(s=>{
      const o=ownerById(s.owner_id);
      const res=resByShirt(s.id);
      const lr=res.length?res[res.length-1]:null;
      const img=s.foto?`<img class="card-img" src="${s.foto}" alt="${s.time}">`:`<div class="card-ph">👕</div>`;
      const rb=lr?`<div class="card-res">⏺ ${lr.nome} · ${fmt(lr.data)}</div>`:'';
      const ab=s.loc==='Emprestimo'
        ?`<button class="res-btn taken">emprestada</button>`
        :lr?`<button class="res-btn taken">reservada</button>`
        :`<button class="res-btn" onclick="event.stopPropagation();openReserva(${s.id})">reservar</button>`;
      return`<div class="card" onclick="openDetail(${s.id})">
        ${img}
        <div class="card-body">
          <div class="card-top">
            <div class="loc-badge loc-${s.loc}">${LOC_LABEL[s.loc]}</div>
            <div class="owner-ind"><span class="odot" style="background:${o.color}"></span>${o.name}</div>
          </div>
          <div class="card-num">Nº ${s.num} · ${s.ano}</div>
          <div class="card-meta">${s.liga}</div>
          ${rb}<div class="card-ar">${ab}</div>
        </div>
      </div>`;
    }).join('');
    return`<div class="team-group" style="animation-delay:${i*.05}s">
      <div class="team-header"><span class="team-label">${team}</span><span class="team-count">${list.length}</span></div>
      <div class="shirt-grid">${cards}</div>
    </div>`;
  }).join('');
}

function openDetail(id){
  const s=shirts.find(x=>x.id===id);
  const res=resByShirt(id);
  const img=s.foto?`<img class="detail-img" src="${s.foto}">`
    :`<div class="photo-upload"><div style="font-size:22px">📷</div><div class="photo-upload-label">Adicionar foto</div></div>`;
  const rl=res.length
    ?res.map(r=>`<div class="ri"><span>${r.nome} · ${fmt(r.data)}</span><button class="btn btn-sm btn-danger" onclick="removeRes(${r.id},${id})">remover</button></div>`).join('')
    :`<div style="font-size:13px;color:var(--text-dim)">Sem reservas</div>`;
  const oo=owners.map(o=>`<option value="${o.id}"${o.id===s.owner_id?' selected':''}>${o.name}</option>`).join('');
  showModal(`<div class="modal">
    <div class="modal-title">${s.time} · Nº ${s.num}</div>
    <div style="cursor:pointer;margin-bottom:1rem" onclick="triggerPhoto('detail',${id})">${img}</div>
    <div class="fg"><label class="fl">Local</label>
      <select class="fi" id="dLoc">${['Casa','Estudio','Lavanderia','Emprestimo'].map(l=>`<option value="${l}"${l===s.loc?' selected':''}>${LOC_LABEL[l]}</option>`).join('')}</select>
    </div>
    <div class="fg"><label class="fl">Origem</label><select class="fi" id="dOwner">${oo}</select></div>
    <div class="fg"><label class="fl">Liga · Temporada</label>
      <div style="font-size:14px;color:var(--text-muted)">${s.liga} · ${s.ano}</div>
    </div>
    <div class="fg"><label class="fl">Reservas</label><div class="res-list">${rl}</div></div>
    <div class="modal-actions">
      <button class="btn btn-sm btn-danger" onclick="deleteShirt(${id})">excluir</button>
      <button class="btn btn-sm" onclick="closeModal()">fechar</button>
      <button class="btn btn-sm btn-accent" id="sdBtn" onclick="saveDetail(${id})">salvar</button>
    </div>
  </div>`);
}

async function saveDetail(id){
  const btn=document.getElementById('sdBtn');
  btn.disabled=true;btn.textContent='salvando...';
  const{error}=await sb.from('shirts').update({loc:document.getElementById('dLoc').value,owner_id:document.getElementById('dOwner').value}).eq('id',id);
  if(error){toast('Erro ao salvar',true);btn.disabled=false;btn.textContent='salvar';return;}
  await loadAll();closeModal();toast('Salvo!');
}

async function deleteShirt(id){
  if(!confirm('Remover esta camisa?'))return;
  await sb.from('shirts').delete().eq('id',id);
  await loadAll();closeModal();toast('Camisa removida');
}

async function removeRes(resId,shirtId){
  await sb.from('reservations').delete().eq('id',resId);
  await loadAll();openDetail(shirtId);
}

function openReserva(id){
  const s=shirts.find(x=>x.id===id);
  showModal(`<div class="modal">
    <div class="modal-title">Reservar · ${s.time} Nº ${s.num}</div>
    <div class="fg"><label class="fl">Seu nome</label><input class="fi" type="text" id="rNome" placeholder="Ex: João"></div>
    <div class="fg"><label class="fl">Data de uso</label><input class="fi" type="date" id="rData"></div>
    <div class="modal-actions">
      <button class="btn btn-sm" onclick="closeModal()">cancelar</button>
      <button class="btn btn-sm btn-accent" id="crBtn" onclick="confirmRes(${id})">confirmar</button>
    </div>
  </div>`);
}

async function confirmRes(id){
  const nome=document.getElementById('rNome').value.trim();
  const data=document.getElementById('rData').value;
  if(!nome||!data){toast('Preencha nome e data',true);return;}
  const btn=document.getElementById('crBtn');btn.disabled=true;btn.textContent='salvando...';
  const{error}=await sb.from('reservations').insert({shirt_id:id,nome,data});
  if(error){toast('Erro ao reservar',true);btn.disabled=false;btn.textContent='confirmar';return;}
  await loadAll();closeModal();toast('Reservado!');
}

function openAdd(){
  addPhoto=null;
  const oo=owners.map(o=>`<option value="${o.id}">${o.name}</option>`).join('');
  showModal(`<div class="modal">
    <div class="modal-title">Nova camisa</div>
    <div class="fg"><label class="fl">Foto</label>
      <div class="photo-upload" onclick="triggerPhoto('add',null)" id="addPhotoArea">
        <div style="font-size:22px">📷</div><div class="photo-upload-label">Toque para adicionar</div>
      </div>
    </div>
    <div class="fg"><label class="fl">Origem</label><select class="fi" id="aOwner">${oo}</select></div>
    <div class="fg"><label class="fl">Time</label><input class="fi" type="text" id="aTime" placeholder="Ex: Flamengo"></div>
    <div class="fg"><label class="fl">Liga</label><input class="fi" type="text" id="aLiga" placeholder="Ex: Brasileirão"></div>
    <div class="fg"><label class="fl">Número</label><input class="fi" type="text" id="aNum" placeholder="Ex: 10"></div>
    <div class="fg"><label class="fl">Temporada</label><input class="fi" type="text" id="aAno" placeholder="Ex: 2024"></div>
    <div class="fg"><label class="fl">Local</label>
      <select class="fi" id="aLoc">
        <option value="Casa">Casa</option><option value="Estudio">Estúdio</option>
        <option value="Lavanderia">Lavanderia</option><option value="Emprestimo">Empréstimo</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-sm" onclick="closeModal()">cancelar</button>
      <button class="btn btn-sm btn-accent" id="caBtn" onclick="confirmAdd()">adicionar</button>
    </div>
  </div>`);
}

async function confirmAdd(){
  const time=document.getElementById('aTime').value.trim();
  const liga=document.getElementById('aLiga').value.trim();
  if(!time||!liga){toast('Preencha time e liga',true);return;}
  const btn=document.getElementById('caBtn');btn.disabled=true;btn.textContent='salvando...';
  const{error}=await sb.from('shirts').insert({
    time,liga,
    num:document.getElementById('aNum').value.trim()||'?',
    ano:document.getElementById('aAno').value.trim()||'?',
    loc:document.getElementById('aLoc').value,
    owner_id:document.getElementById('aOwner').value,
    foto:addPhoto,
  });
  if(error){toast('Erro ao salvar: '+error.message,true);btn.disabled=false;btn.textContent='adicionar';return;}
  await loadAll();closeModal();toast('Camisa adicionada!');
}

function openPeople(){selColor=COLORS[0];renderPeopleModal();}

function renderPeopleModal(){
  const tags=owners.map(o=>`
    <div class="owner-tag">
      <span class="otdot" style="background:${o.color}"></span>
      <span>${o.name}</span>
      <button class="otrm" onclick="removePerson('${o.id}')">✕</button>
    </div>`).join('');
  const co=COLORS.map(c=>`<div class="copt${c===selColor?' sel':''}" style="background:${c}" onclick="pickColor('${c}')"></div>`).join('');
  showModal(`<div class="modal">
    <div class="modal-title">Origens</div>
    <div class="owner-tags">${tags||'<div style="font-size:13px;color:var(--text-dim)">Nenhuma origem.</div>'}</div>
    <div class="divider"></div>
    <div style="font-size:11px;color:var(--text-dim);font-family:var(--mono);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.75rem">Adicionar origem</div>
    <div class="fg"><label class="fl">Nome</label><input class="fi" type="text" id="pName" placeholder="Ex: Pedro"></div>
    <div class="fg"><label class="fl">Cor</label><div class="color-row" id="colorPicker">${co}</div></div>
    <div class="modal-actions">
      <button class="btn btn-sm" onclick="closeModal()">fechar</button>
      <button class="btn btn-sm btn-accent" id="apBtn" onclick="addPerson()">adicionar</button>
    </div>
  </div>`);
}

function pickColor(c){
  selColor=c;
  document.querySelectorAll('.copt').forEach(el=>el.classList.toggle('sel',el.style.background===c||el.style.backgroundColor===c));
}

async function addPerson(){
  const name=document.getElementById('pName').value.trim();
  if(!name){toast('Digite um nome',true);return;}
  const btn=document.getElementById('apBtn');btn.disabled=true;btn.textContent='salvando...';
  const id='o'+Date.now();
  const{error}=await sb.from('owners').insert({id,name,color:selColor});
  if(error){toast('Erro ao salvar',true);btn.disabled=false;btn.textContent='adicionar';return;}
  await loadAll();renderPeopleModal();toast('Origem adicionada!');
}

async function removePerson(id){
  const count=shirts.filter(s=>s.owner_id===id).length;
  if(count>0){
    alert(`Esta origem tem ${count} camisa${count>1?'s':''} vinculada${count>1?'s':''}.\nReatribua as camisas antes de remover.`);
    return;
  }
  if(!confirm('Remover esta origem?'))return;
  const{error}=await sb.from('owners').delete().eq('id',id);
  if(error){toast('Erro ao remover: '+error.message,true);return;}
  if(activeOwner===id)activeOwner='';
  await loadAll();renderPeopleModal();toast('Origem removida!');
}

function triggerPhoto(target,shirtId){pendingPhoto={target,shirtId};document.getElementById('fileInput').click();}

function handleFile(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=async ev=>{
    const url=ev.target.result;
    if(pendingPhoto.target==='add'){
      addPhoto=url;
      const a=document.getElementById('addPhotoArea');
      if(a)a.innerHTML=`<img class="photo-preview" src="${url}">`;
    } else {
      await sb.from('shirts').update({foto:url}).eq('id',pendingPhoto.shirtId);
      await loadAll();openDetail(pendingPhoto.shirtId);
    }
  };
  reader.readAsDataURL(file);e.target.value='';
}

function showModal(html){
  document.getElementById('modalRoot').innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()">${html}</div>`;
}
function closeModal(){document.getElementById('modalRoot').innerHTML='';}

loadAll();
</script>
</body>
</html>
